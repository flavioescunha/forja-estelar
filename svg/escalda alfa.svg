<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="100%" height="100%">
  <defs>
    <radialGradient id="p" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <radialGradient id="n" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#999999"/><stop offset="100%" stop-color="#444444"/>
    </radialGradient>
    <radialGradient id="c12" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#34495e"/><stop offset="100%" stop-color="#2c3e50"/></radialGradient>
    <radialGradient id="o16" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#3498db"/><stop offset="100%" stop-color="#2980b9"/></radialGradient>
    <radialGradient id="ne20" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#9b59b6"/><stop offset="100%" stop-color="#8e44ad"/></radialGradient>
    <radialGradient id="mg24" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#e67e22"/><stop offset="100%" stop-color="#d35400"/></radialGradient>
    
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111" />
    </marker>
    
    <g id="alfa" filter="url(#sh)">
      <circle cx="-8" cy="-8" r="10" fill="url(#p)"/><circle cx="8" cy="8" r="10" fill="url(#p)"/>
      <circle cx="8" cy="-8" r="10" fill="url(#n)"/><circle cx="-8" cy="8" r="10" fill="url(#n)"/>
    </g>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="10"/>

  <style>
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #111; }
    .nuc-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #fff; }
    .line { stroke: #111; stroke-width: 3; fill: none; }
  </style>

  <text x="350" y="40" text-anchor="middle" class="title">Escada Alfa: Rumo ao Silício</text>

  <g transform="translate(100, 100)" filter="url(#sh)">
    <circle cx="0" cy="0" r="30" fill="url(#c12)"/>
    <text x="0" y="6" text-anchor="middle" class="nuc-text">12C</text>
  </g>
  <use href="#alfa" x="180" y="100" />
  <text x="180" y="135" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">+ He-4</text>
  <path d="M 135 100 L 220 100 L 220 170" class="line" marker-end="url(#arr)"/>

  <g transform="translate(220, 210)" filter="url(#sh)">
    <circle cx="0" cy="0" r="33" fill="url(#o16)"/>
    <text x="0" y="6" text-anchor="middle" class="nuc-text">16O</text>
  </g>
  <use href="#alfa" x="320" y="210" />
  <text x="320" y="245" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">+ He-4</text>
  <path d="M 260 210 L 360 210 L 360 280" class="line" marker-end="url(#arr)"/>

  <g transform="translate(360, 320)" filter="url(#sh)">
    <circle cx="0" cy="0" r="36" fill="url(#ne20)"/>
    <text x="0" y="6" text-anchor="middle" class="nuc-text">20Ne</text>
  </g>
  <use href="#alfa" x="480" y="320" />
  <text x="480" y="355" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">+ He-4</text>
  <path d="M 405 320 L 520 320 L 520 390" class="line" marker-end="url(#arr)"/>

  <g transform="translate(520, 430)" filter="url(#sh)">
    <circle cx="0" cy="0" r="39" fill="url(#mg24)"/>
    <text x="0" y="6" text-anchor="middle" class="nuc-text">24Mg</text>
  </g>
  
  <text x="620" y="435" text-anchor="start" font-family="Arial" font-size="16" font-weight="bold" fill="#555">... até 28Si</text>
  <path d="M 565 430 L 610 430" stroke="#555" stroke-width="3" stroke-dasharray="5,5" fill="none"/>

</svg>
