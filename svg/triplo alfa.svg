<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <radialGradient id="p" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <radialGradient id="n" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#999999"/><stop offset="100%" stop-color="#444444"/>
    </radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="10"/>

  <style>
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #111; }
    .lbl { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #111; }
    .sub { font-family: Arial, sans-serif; font-size: 12px; fill: #e74c3c; font-weight: bold;}
    .line { stroke: #2c3e50; stroke-width: 2; fill: none; }
  </style>

  <text x="300" y="40" text-anchor="middle" class="title">Processo Triplo-Alfa</text>

  <g transform="translate(80, 120)" filter="url(#sh)">
    <circle cx="-10" cy="-10" r="14" fill="url(#p)"/><circle cx="10" cy="10" r="14" fill="url(#p)"/>
    <circle cx="10" cy="-10" r="14" fill="url(#n)"/><circle cx="-10" cy="10" r="14" fill="url(#n)"/>
  </g>
  <g transform="translate(80, 240)" filter="url(#sh)">
    <circle cx="-10" cy="-10" r="14" fill="url(#p)"/><circle cx="10" cy="10" r="14" fill="url(#p)"/>
    <circle cx="10" cy="-10" r="14" fill="url(#n)"/><circle cx="-10" cy="10" r="14" fill="url(#n)"/>
  </g>
  <text x="80" y="300" text-anchor="middle" class="lbl">2x Hélio-4</text>

  <path d="M 120 130 Q 200 180 230 180" class="line" marker-end="url(#arr)"/>
  <path d="M 120 230 Q 200 180 230 180" class="line" marker-end="url(#arr)"/>

  <g transform="translate(260, 180)" filter="url(#sh)">
    <circle cx="-15" cy="-15" r="12" fill="url(#p)"/><circle cx="15" cy="-15" r="12" fill="url(#p)"/>
    <circle cx="-15" cy="15" r="12" fill="url(#p)"/><circle cx="15" cy="15" r="12" fill="url(#p)"/>
    <circle cx="0" cy="-20" r="12" fill="url(#n)"/><circle cx="0" cy="20" r="12" fill="url(#n)"/>
    <circle cx="-20" cy="0" r="12" fill="url(#n)"/><circle cx="20" cy="0" r="12" fill="url(#n)"/>
  </g>
  <text x="260" y="240" text-anchor="middle" class="lbl">Berílio-8</text>
  <text x="260" y="260" text-anchor="middle" class="sub">(MUITO INSTÁVEL)</text>

  <g transform="translate(260, 60)" filter="url(#sh)">
    <circle cx="-10" cy="-10" r="12" fill="url(#p)"/><circle cx="10" cy="10" r="12" fill="url(#p)"/>
    <circle cx="10" cy="-10" r="12" fill="url(#n)"/><circle cx="-10" cy="10" r="12" fill="url(#n)"/>
  </g>
  <path d="M 260 90 L 260 130" class="line" marker-end="url(#arr)" stroke-dasharray="4,4"/>
  <text x="350" y="90" text-anchor="middle" class="lbl">3º Hélio-4</text>

  <path d="M 310 180 L 370 180" class="line" marker-end="url(#arr)"/>
  <polygon points="380,165 390,180 405,180 395,190 400,205 380,195 360,205 365,190 355,180 370,180" fill="#f1c40f" filter="url(#sh)"/>

  <g transform="translate(490, 180)" filter="url(#sh)">
    <circle cx="-20" cy="-10" r="12" fill="url(#p)"/><circle cx="0" cy="-25" r="12" fill="url(#n)"/>
    <circle cx="20" cy="-10" r="12" fill="url(#p)"/><circle cx="-25" cy="10" r="12" fill="url(#n)"/>
    <circle cx="25" cy="10" r="12" fill="url(#n)"/><circle cx="-10" cy="25" r="12" fill="url(#p)"/>
    <circle cx="10" cy="25" r="12" fill="url(#p)"/><circle cx="0" cy="0" r="12" fill="url(#p)"/>
    <circle cx="-10" cy="-10" r="12" fill="url(#n)"/><circle cx="10" cy="-10" r="12" fill="url(#n)"/>
    <circle cx="-10" cy="10" r="12" fill="url(#p)"/><circle cx="10" cy="10" r="12" fill="url(#n)"/>
  </g>
  <text x="490" y="250" text-anchor="middle" class="lbl">Carbono-12 (Estável)</text>
  <text x="490" y="270" text-anchor="middle" class="lbl" fill="#e67e22">+ Energia (γ)</text>
</svg>
