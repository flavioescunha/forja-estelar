<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="100%" height="100%">
  <defs>
    <radialGradient id="p" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <radialGradient id="n" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#999999"/><stop offset="100%" stop-color="#444444"/>
    </radialGradient>
    <radialGradient id="pos" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2c3e50" />
    </marker>

    <g id="proton"><circle cx="0" cy="0" r="14" fill="url(#p)" filter="url(#sh)"/></g>
    <g id="neutron"><circle cx="0" cy="0" r="14" fill="url(#n)" filter="url(#sh)"/></g>
    <g id="positron"><circle cx="0" cy="0" r="7" fill="url(#pos)" stroke="#777" stroke-width="1" filter="url(#sh)"/></g>
    
    <g id="star">
      <polygon points="0,-14 3,-4 13,-4 5,4 8,13 0,7 -8,13 -5,4 -13,-4 -3,-4" fill="#f1c40f" filter="url(#sh)"/>
    </g>

    <g id="alpha" filter="url(#sh)">
      <circle cx="-10" cy="-10" r="14" fill="url(#p)"/>
      <circle cx="10" cy="10" r="14" fill="url(#p)"/>
      <circle cx="-10" cy="10" r="14" fill="url(#n)"/>
      <circle cx="10" cy="-10" r="14" fill="url(#n)"/>
    </g>

    <g id="nucleus" filter="url(#sh)">
      <circle cx="-18" cy="-10" r="14" fill="url(#p)"/>
      <circle cx="15" cy="-15" r="14" fill="url(#n)"/>
      <circle cx="0" cy="-22" r="14" fill="url(#n)"/>
      <circle cx="-15" cy="15" r="14" fill="url(#n)"/>
      <circle cx="18" cy="10" r="14" fill="url(#p)"/>
      <circle cx="5" cy="20" r="14" fill="url(#p)"/>
      <circle cx="-22" cy="5" r="14" fill="url(#p)"/>
      <circle cx="20" cy="-5" r="14" fill="url(#n)"/>
      <circle cx="0" cy="0" r="14" fill="url(#p)"/>
      <circle cx="-8" cy="-8" r="14" fill="url(#n)"/>
      <circle cx="8" cy="-8" r="14" fill="url(#p)"/>
      <circle cx="-8" cy="8" r="14" fill="url(#p)"/>
      <circle cx="8" cy="8" r="14" fill="url(#n)"/>
    </g>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="10"/>

  <style>
    .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #111; }
    .nuc-lbl { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #111; }
    .nuc-small { font-size: 14px; }
    .sym-lbl { font-family: 'Times New Roman', serif; font-size: 24px; font-weight: bold; fill: #111; }
    .line { stroke: #2c3e50; stroke-width: 2.5; fill: none; }
    .leg-text { font-family: Arial, sans-serif; font-size: 16px; fill: #333; }
  </style>

  <text x="400" y="40" text-anchor="middle" class="title">Ciclo CNO</text>

  <path d="M 555 200 L 610 255" class="line" marker-end="url(#arr)"/>
  <path d="M 635 285 L 655 365" class="line" marker-end="url(#arr)"/>
  <path d="M 655 435 L 635 515" class="line" marker-end="url(#arr)"/>
  <path d="M 610 545 L 555 600" class="line" marker-end="url(#arr)"/>
  <path d="M 500 640 L 420 655" class="line" marker-end="url(#arr)"/>
  <path d="M 380 655 L 300 640" class="line" marker-end="url(#arr)"/>
  <path d="M 245 600 L 190 545" class="line" marker-end="url(#arr)"/>
  <path d="M 165 515 L 145 435" class="line" marker-end="url(#arr)"/>
  <path d="M 145 365 L 165 285" class="line" marker-end="url(#arr)"/>
  <path d="M 190 255 L 245 200" class="line" marker-end="url(#arr)"/>
  <path d="M 300 160 L 380 145" class="line" marker-end="url(#arr)"/>
  <path d="M 420 145 L 500 160" class="line" marker-end="url(#arr)"/>

  <use href="#nucleus" x="530" y="175" />
  <text x="560" y="210" class="nuc-lbl"><tspan class="nuc-small" dy="-8">12</tspan><tspan dy="8">C</tspan></text>

  <use href="#nucleus" x="660" y="400" />
  <text x="680" y="430" class="nuc-lbl"><tspan class="nuc-small" dy="-8">13</tspan><tspan dy="8">N</tspan></text>

  <use href="#nucleus" x="530" y="625" />
  <text x="560" y="660" class="nuc-lbl"><tspan class="nuc-small" dy="-8">13</tspan><tspan dy="8">C</tspan></text>

  <use href="#nucleus" x="270" y="625" />
  <text x="220" y="660" class="nuc-lbl"><tspan class="nuc-small" dy="-8">14</tspan><tspan dy="8">N</tspan></text>

  <use href="#nucleus" x="140" y="400" />
  <text x="90" y="430" class="nuc-lbl"><tspan class="nuc-small" dy="-8">15</tspan><tspan dy="8">O</tspan></text>

  <use href="#nucleus" x="270" y="175" />
  <text x="220" y="210" class="nuc-lbl"><tspan class="nuc-small" dy="-8">15</tspan><tspan dy="8">N</tspan></text>

  <use href="#star" x="625" y="270" />
  <use href="#proton" x="680" y="150" />
  <text x="705" y="155" class="nuc-lbl"><tspan class="nuc-small" dy="-8">1</tspan><tspan dy="8">H</tspan></text>
  <path d="M 670 165 L 635 255" class="line" marker-end="url(#arr)"/>
  <path d="M 640 270 L 700 270" class="line" marker-end="url(#arr)"/>
  <text x="715" y="278" class="sym-lbl">γ</text>

  <use href="#star" x="625" y="530" />
  <use href="#positron" x="570" y="580" />
  <path d="M 615 540 L 580 570" class="line" marker-end="url(#arr)"/>
  <path d="M 635 540 L 690 570" class="line" marker-end="url(#arr)"/>
  <text x="705" y="585" class="sym-lbl">ν</text>

  <use href="#star" x="400" y="660" />
  <use href="#proton" x="480" y="750" />
  <text x="505" y="755" class="nuc-lbl"><tspan class="nuc-small" dy="-8">1</tspan><tspan dy="8">H</tspan></text>
  <path d="M 470 735 L 415 675" class="line" marker-end="url(#arr)"/>
  <path d="M 385 675 L 330 735" class="line" marker-end="url(#arr)"/>
  <text x="305" y="755" class="sym-lbl">γ</text>

  <use href="#star" x="175" y="530" />
  <use href="#proton" x="175" y="650" />
  <text x="200" y="655" class="nuc-lbl"><tspan class="nuc-small" dy="-8">1</tspan><tspan dy="8">H</tspan></text>
  <path d="M 175 635 L 175 550" class="line" marker-end="url(#arr)"/>
  <path d="M 160 540 L 85 590" class="line" marker-end="url(#arr)"/>
  <text x="65" y="615" class="sym-lbl">γ</text>

  <use href="#star" x="175" y="270" />
  <use href="#positron" x="230" y="220" />
  <path d="M 185 260 L 220 230" class="line" marker-end="url(#arr)"/>
  <path d="M 165 260 L 110 210" class="line" marker-end="url(#arr)"/>
  <text x="90" y="205" class="sym-lbl">ν</text>

  <use href="#star" x="400" y="140" />
  <use href="#proton" x="280" y="140" />
  <text x="245" y="145" class="nuc-lbl"><tspan class="nuc-small" dy="-8">1</tspan><tspan dy="8">H</tspan></text>
  <path d="M 300 140 L 380 140" class="line" marker-end="url(#arr)"/>
  <use href="#alpha" x="400" y="40" />
  <text x="440" y="45" class="nuc-lbl"><tspan class="nuc-small" dy="-8">4</tspan><tspan dy="8">He</tspan></text>
  <path d="M 400 120 L 400 70" class="line" marker-end="url(#arr)"/>

  <rect x="200" y="780" width="400" height="100" fill="none" stroke="#555" stroke-width="1.5" rx="5"/>
  
  <use href="#proton" x="230" y="805" />
  <text x="260" y="810" class="leg-text">Próton</text>
  
  <use href="#neutron" x="230" y="845" />
  <text x="260" y="850" class="leg-text">Nêutron</text>
  
  <use href="#positron" x="380" y="805" />
  <text x="400" y="810" class="leg-text">Pósitron</text>

  <text x="500" y="810" class="sym-lbl">γ</text>
  <text x="525" y="810" class="leg-text">Raio Gama</text>
  
  <text x="500" y="850" class="sym-lbl">ν</text>
  <text x="525" y="850" class="leg-text">Neutrino</text>

</svg>
